name: cloudflare-backend-deploy

on:
  workflow_dispatch:
    inputs:
      target_service:
        description: Target backend service
        required: true
        default: playback-worker
        type: choice
        options:
          - playback-worker
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Validate Cloudflare playback-worker config
        run: ./scripts/cloudflare/validate.sh

      - name: Verify Cloudflare authentication
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/cloudflare/whoami.sh

  deploy_playback_worker:
    name: Deploy playback-worker
    if: ${{ vars.ENABLE_CLOUDFLARE_BACKEND_DEPLOY == 'true' && inputs.target_service == 'playback-worker' }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 migrations apply PLAYBACK_DB --remote --config apps/playback-worker/wrangler.toml

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config apps/playback-worker/wrangler.toml

  deploy_disabled_notice:
    name: Deploy disabled
    if: ${{ vars.ENABLE_CLOUDFLARE_BACKEND_DEPLOY != 'true' }}
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Explain disabled deploy
        run: |
          echo "Cloudflare backend deploy is disabled."
          echo "Set repository variable ENABLE_CLOUDFLARE_BACKEND_DEPLOY=true to enable deployment."
