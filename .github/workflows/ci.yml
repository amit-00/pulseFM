name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - cloudflare-migration

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install client dependencies
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Lint client
        working-directory: client
        run: bun x eslint hooks/useStreamPlayer.ts lib/stream.ts lib/types.ts app/layout.tsx components/VotePanel.tsx next.config.ts

      - name: Build static client
        working-directory: client
        env:
          NEXT_PUBLIC_API_BASE_URL: /api
          NEXT_PUBLIC_SITE_URL: https://pulsefm.example.com
        run: bun run build

      - name: Install Cloudflare runtime dependencies
        working-directory: cloudflare
        run: npm install

      - name: Typecheck Cloudflare runtime
        working-directory: cloudflare
        run: npm run check
