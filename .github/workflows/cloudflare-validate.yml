name: cloudflare-validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/cloudflare/**'
      - 'docs/cloudflare/**'
      - 'scripts/cloudflare/**'
      - '.github/workflows/cloudflare-*.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Validate Cloudflare boilerplate
        run: ./scripts/cloudflare/validate.sh
